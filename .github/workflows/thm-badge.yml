name: Update TryHackMe Badge

on:
  schedule:
    - cron: '0 0 * * *' # Runs every day at midnight
  workflow_dispatch: # Allows manual triggering

jobs:
  update-badge:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v2

    - name: Fetch TryHackMe Badge
      uses: SouravBose/tryhackme-badge-action@v1.0
      with:
        image_path: './assets/badge.png'
        username: 'SouravBose'
        user_id: '2223060'
        committer_username: 'SHROUDSOURAV'
        committer_email: 'souravbose361@gmail.com'
        commit_message: 'Updated THM profile badge'
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}